<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>API Dashboard - Rocky</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #09090b; --surface: #111113; --border: #27272a;
      --accent: #6366f1; --accent2: #8b5cf6;
      --text: #fafafa; --muted: #71717a;
      --green: #22c55e; --blue: #3b82f6; --red: #ef4444;
      --tg: #229ED9;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(9,9,11,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
    }
    .logo {
      font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .operator-badge {
      background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
      color: var(--accent); padding: 4px 12px; border-radius: 999px; font-size: 0.75rem;
    }
    .nav-right a { color: var(--muted); font-size: 0.8rem; text-decoration: none; transition: color 0.2s; }
    .nav-right a:hover { color: var(--text); }
    .nav-right .tg-link { color: var(--tg); }

    .layout { display: flex; padding-top: 60px; min-height: 100vh; }

    .sidebar {
      width: 250px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      height: calc(100vh - 60px); position: sticky; top: 60px;
      overflow-y: auto; padding: 1.5rem 0;
    }
    .sidebar-title { padding: 0 1.5rem 0.8rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .category-label { padding: 0.4rem 1.5rem; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .sidebar-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 1.5rem; cursor: pointer; transition: background 0.15s; font-size: 0.88rem; }
    .sidebar-item:hover { background: rgba(99,102,241,0.08); }
    .method-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .GET { background: rgba(34,197,94,0.2); color: var(--green); }
    .POST { background: rgba(59,130,246,0.2); color: var(--blue); }

    .main { flex: 1; padding: 2rem; max-width: 900px; }

    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; text-align: center; }
    .stat-card .num {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-card .label { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

    .api-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 1.5rem; overflow: hidden; }
    .api-card-header { display: flex; align-items: center; gap: 1rem; padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); }
    .api-card-header h3 { font-size: 1rem; }
    .api-card-header p { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }
    .endpoint-url { font-family: monospace; font-size: 0.82rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--accent); margin-left: auto; flex-shrink: 0; }

    .api-card-body { padding: 1.5rem; }
    .params-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.8rem; }
    .param-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem; }
    .param-row label { font-size: 0.85rem; color: var(--muted); width: 80px; flex-shrink: 0; }
    .param-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .param-row input:focus { border-color: var(--accent); }
    .required-tag { font-size: 0.7rem; color: var(--red); background: rgba(239,68,68,0.1); padding: 2px 6px; border-radius: 4px; }

    .try-btn { margin-top: 1rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .try-btn:hover { opacity: 0.9; }
    .try-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .response-box { margin-top: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 0.8rem; color: #a5f3fc; white-space: pre-wrap; max-height: 300px; overflow-y: auto; display: none; }
    .response-box.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .endpoint-url { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">◆ Rocky API — Dashboard</div>
  <div class="nav-right">
    <span class="operator-badge">◆ OPERATED BY rocky</span>
    <a href="https://t.me/alveeevanrocky320" target="_blank" class="tg-link">✈️ @alveeevanrocky320</a>
    <a href="https://github.com/messengergoatbot320-lang/Rocky-Bot-320" target="_blank">🔗 GitHub</a>
    <a href="/">← Home</a>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">API Endpoints</div>
    <div id="sidebar-list">Loading...</div>
  </aside>

  <main class="main">
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="s-total">–</div><div class="label">Total APIs</div></div>
      <div class="stat-card"><div class="num" id="s-cats">–</div><div class="label">Categories</div></div>
      <div class="stat-card"><div class="num" id="s-get">–</div><div class="label">GET Endpoints</div></div>
      <div class="stat-card"><div class="num" id="s-post">–</div><div class="label">POST Endpoints</div></div>
    </div>
    <div id="api-list">
      <p style="color:var(--muted);text-align:center;margin-top:3rem">Loading APIs...</p>
    </div>
  </main>
</div>

<script>
const BASE = window.location.origin;

async function loadApis() {
  try {
    const res = await fetch(`${BASE}/api/list`);
    const data = await res.json();

    document.getElementById('s-total').textContent = data.total;
    document.getElementById('s-cats').textContent = data.categories;
    document.getElementById('s-get').textContent = data.get_endpoints;
    document.getElementById('s-post').textContent = data.post_endpoints;

    const grouped = {};
    data.apis.forEach(api => {
      if (!grouped[api.category]) grouped[api.category] = [];
      grouped[api.category].push(api);
    });

    document.getElementById('sidebar-list').innerHTML = Object.entries(grouped).map(([cat, apis]) => `
      <div>
        <div class="category-label">${cat}</div>
        ${apis.map(api => `
          <div class="sidebar-item" onclick="scrollToCard(${data.apis.indexOf(api)})">
            <span class="method-badge ${api.method}">${api.method}</span>
            ${api.name}
          </div>
        `).join('')}
      </div>
    `).join('');

    document.getElementById('api-list').innerHTML = data.apis.map((api, i) => `
      <div class="api-card" id="card-${i}">
        <div class="api-card-header">
          <span class="method-badge ${api.method}" style="font-size:0.75rem;padding:4px 10px">${api.method}</span>
          <div>
            <h3>${api.name}</h3>
            <p>${api.description}</p>
          </div>
          <code class="endpoint-url">${api.endpoint}</code>
        </div>
        <div class="api-card-body">
          ${api.params && api.params.length > 0 ? `
            <div class="params-title">Parameters</div>
            ${api.params.map(p => `
              <div class="param-row">
                <label>${p.name}</label>
                <input type="text" id="p-${i}-${p.name}" placeholder="${p.name}..."/>
                ${p.required ? '<span class="required-tag">required</span>' : ''}
              </div>
            `).join('')}
          ` : '<p style="color:var(--muted);font-size:0.85rem">No parameters required</p>'}
          <button class="try-btn" onclick="tryApi('${api.endpoint}', ${JSON.stringify(api.params||[])}, ${i}, this)">
            ▶ Try It
          </button>
          <pre class="response-box" id="res-${i}"></pre>
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('api-list').innerHTML =
      '<p style="color:#ef4444;text-align:center;margin-top:3rem">Failed to load. Make sure backend is running.</p>';
  }
}

async function tryApi(endpoint, params, idx, btn) {
  const resBox = document.getElementById(`res-${idx}`);
  let url = BASE + endpoint;

  if (params && params.length > 0) {
    const qp = new URLSearchParams();
    params.forEach(p => {
      const val = document.getElementById(`p-${idx}-${p.name}`)?.value;
      if (val) qp.set(p.name, val);
    });
    if (qp.toString()) url += '?' + qp.toString();
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>Loading...';
  resBox.className = 'response-box show';
  resBox.textContent = 'Fetching...';

  try {
    const r = await fetch(url);
    const d = await r.json();
    resBox.textContent = JSON.stringify(d, null, 2);
  } catch(e) {
    resBox.textContent = 'Error: ' + e.message;
  }

  btn.disabled = false;
  btn.innerHTML = '▶ Try It';
}

function scrollToCard(idx) {
  document.getElementById(`card-${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

loadApis();
</script>
</body>
</html>
