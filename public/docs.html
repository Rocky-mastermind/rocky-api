<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="API Dashboard – Explore, test, and interact with APIs in a sleek, modern interface."/>
  <title>API Dashboard - Rocky</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --background: #09090b; --foreground: #fafafa;
      --card: #09090b; --border: #27272a;
      --muted: #27272a; --muted-foreground: #a1a1aa;
      --primary: #6d28d9; --radius: 0.5rem;
      --gradient-start: #6d28d9; --gradient-end: #7c3aed;
      --green: #22c55e; --blue: #3b82f6; --red: #ef4444;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--background); color: var(--foreground); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--background); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* NAV */
    .topbar {
      height: 56px; flex-shrink: 0;
      background: rgba(9,9,11,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 1.5rem; gap: 1rem;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .topbar-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .topbar-logo img { width: 28px; height: 28px; border-radius: 6px; }
    .topbar-logo span {
      font-size: 1rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .operator-pill {
      background: rgba(109,40,217,0.12);
      border: 1px solid rgba(109,40,217,0.25);
      color: #a78bfa;
      padding: 3px 10px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.05em;
    }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .topbar-right a { color: var(--muted-foreground); font-size: 0.8rem; text-decoration: none; transition: color 0.2s; }
    .topbar-right a:hover { color: var(--foreground); }
    .topbar-right .tg { color: #229ED9; }

    /* LAYOUT */
    .layout { flex: 1; display: flex; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: #0a0a0c;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 1rem 1.2rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search {
      width: 100%;
      background: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px; color: var(--foreground);
      font-size: 0.82rem; outline: none;
    }
    .sidebar-search:focus { border-color: rgba(109,40,217,0.5); }
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    .cat-label {
      padding: 0.6rem 1.2rem 0.3rem;
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted-foreground);
      font-weight: 600;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.45rem 1.2rem;
      cursor: pointer; font-size: 0.85rem;
      transition: background 0.15s;
      border-left: 2px solid transparent;
    }
    .sidebar-item:hover { background: rgba(109,40,217,0.06); }
    .sidebar-item.active {
      background: rgba(109,40,217,0.1);
      border-left-color: var(--primary);
      color: #a78bfa;
    }
    .mbadge {
      font-size: 0.6rem; font-weight: 700;
      padding: 2px 5px; border-radius: 3px;
      flex-shrink: 0; font-family: monospace;
    }
    .GET { background: rgba(34,197,94,0.15); color: var(--green); }
    .POST { background: rgba(59,130,246,0.15); color: var(--blue); }

    /* MAIN */
    .main {
      flex: 1; overflow-y: auto;
      padding: 1.5rem;
    }

    /* STAT CARDS */
    .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.2rem;
    }
    .stat-card .label { color: var(--muted-foreground); font-size: 0.75rem; margin-bottom: 0.4rem; }
    .stat-card .value {
      font-size: 1.6rem; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-card .sub { color: var(--muted-foreground); font-size: 0.72rem; margin-top: 2px; }

    /* API CARD */
    .api-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 1.2rem;
      overflow: hidden; transition: border-color 0.2s;
    }
    .api-card:hover { border-color: rgba(109,40,217,0.3); }
    .api-card-top {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .api-card-info { flex: 1; min-width: 0; }
    .api-card-info h3 { font-size: 0.95rem; font-weight: 700; }
    .api-card-info p { color: var(--muted-foreground); font-size: 0.8rem; margin-top: 2px; }
    .api-endpoint {
      font-family: monospace; font-size: 0.78rem;
      background: rgba(109,40,217,0.08);
      border: 1px solid rgba(109,40,217,0.2);
      border-radius: 5px; padding: 3px 8px;
      color: #a78bfa; white-space: nowrap;
    }
    .api-card-body { padding: 1.2rem; }
    .param-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted-foreground); margin-bottom: 0.7rem; font-weight: 600; }
    .param-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.5rem; }
    .param-name { font-size: 0.82rem; color: var(--muted-foreground); width: 75px; flex-shrink: 0; font-family: monospace; }
    .param-input {
      flex: 1; background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 10px; color: var(--foreground);
      font-size: 0.85rem; outline: none;
      transition: border-color 0.2s;
    }
    .param-input:focus { border-color: rgba(109,40,217,0.5); }
    .req-badge { font-size: 0.65rem; color: var(--red); background: rgba(239,68,68,0.1); padding: 2px 5px; border-radius: 3px; }
    .opt-badge { font-size: 0.65rem; color: var(--muted-foreground); background: rgba(255,255,255,0.05); padding: 2px 5px; border-radius: 3px; }
    .run-btn {
      margin-top: 0.8rem;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      color: white; border: none;
      padding: 8px 20px; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .run-btn:hover { opacity: 0.88; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .res-box {
      margin-top: 0.8rem;
      background: #050506;
      border: 1px solid var(--border);
      border-radius: 8px; padding: 1rem;
      font-family: monospace; font-size: 0.78rem;
      color: #6ee7b7; white-space: pre-wrap;
      max-height: 280px; overflow-y: auto;
      display: none;
    }
    .res-box.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }

    /* LOADING STATE */
    .loading-state { text-align: center; padding: 4rem; color: var(--muted-foreground); }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .stat-grid { grid-template-columns: repeat(2,1fr); }
      .api-endpoint { display: none; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <a href="/" class="topbar-logo">
      <img src="https://i.ibb.co/XYk4dXn/image.png" alt="Rocky API"/>
      <span>API Dashboard</span>
    </a>
    <span class="operator-pill">◆ OPERATED BY rocky</span>
  </div>
  <div class="topbar-right">
    <a href="https://t.me/alveeevanrocky320" target="_blank" class="tg">✈️ @alveeevanrocky320</a>
    <a href="https://github.com/messengergoatbot320-lang/Rocky-Bot-320" target="_blank">🔗 GitHub</a>
    <a href="/">← Home</a>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <input class="sidebar-search" type="text" placeholder="🔍 Search APIs..." oninput="filterApis(this.value)"/>
    </div>
    <div class="sidebar-scroll" id="sidebarList">
      <div style="padding:1rem;color:var(--muted-foreground);font-size:0.82rem">Loading...</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainScroll">
    <!-- STAT CARDS -->
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Total APIs</div><div class="value" id="stTotal">–</div><div class="sub">endpoints</div></div>
      <div class="stat-card"><div class="label">Categories</div><div class="value" id="stCats">–</div><div class="sub">groups</div></div>
      <div class="stat-card"><div class="label">GET Endpoints</div><div class="value" id="stGet">–</div><div class="sub">endpoints</div></div>
      <div class="stat-card"><div class="label">POST Endpoints</div><div class="value" id="stPost">–</div><div class="sub">endpoints</div></div>
    </div>

    <!-- API LIST -->
    <div id="apiList">
      <div class="loading-state">Loading Dashboard...</div>
    </div>
  </main>
</div>

<script>
const BASE = window.location.origin;
let allApis = [];

async function init() {
  try {
    const res = await fetch(`${BASE}/api/list`);
    const data = await res.json();
    allApis = data.apis;

    document.getElementById('stTotal').textContent = data.total;
    document.getElementById('stCats').textContent = data.categories;
    document.getElementById('stGet').textContent = data.get_endpoints;
    document.getElementById('stPost').textContent = data.post_endpoints;

    renderSidebar(allApis);
    renderCards(allApis);
  } catch(e) {
    document.getElementById('apiList').innerHTML = '<div class="loading-state" style="color:#ef4444">Failed to load. Make sure backend is running.</div>';
  }
}

function renderSidebar(apis) {
  const grouped = {};
  apis.forEach(api => {
    if (!grouped[api.category]) grouped[api.category] = [];
    grouped[api.category].push(api);
  });
  document.getElementById('sidebarList').innerHTML = Object.entries(grouped).map(([cat, list]) => `
    <div class="cat-label">${cat}</div>
    ${list.map(api => {
      const idx = allApis.indexOf(api);
      return `<div class="sidebar-item" onclick="goTo(${idx})" id="sb-${idx}">
        <span class="mbadge ${api.method}">${api.method}</span>
        ${api.name}
      </div>`;
    }).join('')}
  `).join('');
}

function renderCards(apis) {
  document.getElementById('apiList').innerHTML = apis.map((api, i) => {
    const idx = allApis.indexOf(api);
    return `
    <div class="api-card" id="card-${idx}">
      <div class="api-card-top">
        <span class="mbadge ${api.method}" style="font-size:0.7rem;padding:3px 8px">${api.method}</span>
        <div class="api-card-info">
          <h3>${api.name}</h3>
          <p>${api.description}</p>
        </div>
        <code class="api-endpoint">${api.endpoint}</code>
      </div>
      <div class="api-card-body">
        ${api.params && api.params.length > 0 ? `
          <div class="param-label">Parameters</div>
          ${api.params.map(p => `
            <div class="param-row">
              <span class="param-name">${p.name}</span>
              <input class="param-input" id="pi-${idx}-${p.name}" type="text" placeholder="${p.name}..."/>
              ${p.required ? '<span class="req-badge">required</span>' : '<span class="opt-badge">optional</span>'}
            </div>
          `).join('')}
        ` : `<p style="color:var(--muted-foreground);font-size:0.82rem;margin-bottom:0.5rem">No parameters required</p>`}
        <button class="run-btn" onclick="runApi('${api.endpoint}',${JSON.stringify(api.params||[])},${idx},this)">
          ▶ Try It
        </button>
        <pre class="res-box" id="rb-${idx}"></pre>
      </div>
    </div>`;
  }).join('');
}

async function runApi(endpoint, params, idx, btn) {
  const rb = document.getElementById(`rb-${idx}`);
  let url = BASE + endpoint;
  if (params.length > 0) {
    const qp = new URLSearchParams();
    params.forEach(p => {
      const v = document.getElementById(`pi-${idx}-${p.name}`)?.value;
      if (v) qp.set(p.name, v);
    });
    if (qp.toString()) url += '?' + qp.toString();
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Loading...';
  rb.className = 'res-box show';
  rb.textContent = 'Fetching...';
  try {
    const r = await fetch(url);
    const d = await r.json();
    rb.textContent = JSON.stringify(d, null, 2);
  } catch(e) {
    rb.textContent = 'Error: ' + e.message;
  }
  btn.disabled = false;
  btn.innerHTML = '▶ Try It';
}

function goTo(idx) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`sb-${idx}`)?.classList.add('active');
  document.getElementById(`card-${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function filterApis(q) {
  const filtered = q
    ? allApis.filter(a => a.name.toLowerCase().includes(q.toLowerCase()) || a.endpoint.toLowerCase().includes(q.toLowerCase()))
    : allApis;
  renderSidebar(filtered);
  renderCards(filtered);
}

init();
</script>
</body>
</html>
